  /test-gc/state:
    get:
      tags:
      - subscriber-listener-test-api
      operationId: getTestEndpointState
      parameters:
      - name: data-partition-id
        in: header
        description: Tenant Id
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: object
                  properties:
                    opaque:
                      type: integer
                      format: int64
                    acquire:
                      type: integer
                      format: int64
                    release:
                      type: integer
                      format: int64
                      writeOnly: true
                    andIncrement:
                      type: integer
                      format: int64
                    andDecrement:
                      type: integer
                      format: int64
                    plain:
                      type: integer
                      format: int64
