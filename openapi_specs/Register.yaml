      requestBody:
        content:
          application/json:
            schema:
              type: object
        required: true
      responses:
        "200":
          description: OK
  /subscription:
    get:
      tags:
      - subscriber-api
      summary: Query Subscription
      description: "Query Subscription by notification Id.  Required roles: `users.datalake.ops`\
