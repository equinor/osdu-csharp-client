      parameters:
      - name: type
        in: query
        description: Specifies the type in ddms I.E wellbores
        required: true
        schema:
          type: string
          pattern: "^[A-Za-z0-9]{1,50}"
      - name: data-partition-id
        in: header
        description: Tenant Id
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Ddms"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "401":
