openapi: 3.1.0
info:
  title: Register Service
  description: APIs to manage registrations in the OSDU.
  contact:
    name: OSDU Data Platform Team
    email: dps@OSDU.org
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
  version: "1.0"
servers:
- url: /api/register/v1
security:
- Authorization: []
tags:
- name: subscriber-api
  description: Subscriber API
- name: ddms-api
  description: Domain Data Management Service (DDMS) API
- name: action-api
  description: Action API
- name: health-checks-api
  description: Health Checks API
- name: info
  description: Version info endpoint
paths:
  /subscription/{id}/secret:
    put:
      tags:
      - subscriber-api
      summary: Update secret for a subscription
      description: "Update secret for a subscription. Required roles :  `users.datalake.ops`\
        \ or `users.datalake.admins` or `users.datalake.editors`"
      operationId: updateSecret
      parameters:
      - name: id
        in: path
        description: Subscription Id
        required: true
        schema:
          type: string
          minLength: 1
      - name: data-partition-id
        in: header
        description: Tenant Id
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
              - $ref: "#/components/schemas/GsaSecret"
              - $ref: "#/components/schemas/HmacSecret"
        required: true
      responses:
        "204":
          description: No Content
          content:
            application/json:
              schema:
                type: string
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "403":
          description: User not authorized to perform the action.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "409":
          description: Conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "502":
          description: Bad Gateway
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "503":
          description: Service Unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
      security:
      - Authorization: []
  /test-gc/gsa-challenge/{path}:
    get:
      tags:
      - subscriber-listener-test-api
      operationId: testGsa
      parameters:
      - name: path
        in: path
        required: true
        schema:
          type: string
      - name: crc
        in: query
        required: true
        schema:
          type: string
          minLength: 1
      - name: data-partition-id
        in: header
        description: Tenant Id
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChallengeResponse"
    post:
      tags:
      - subscriber-listener-test-api
      operationId: testPushGsa
      parameters:
      - name: path
        in: path
        required: true
        schema:
          type: string
      - name: data-partition-id
        in: header
        description: Tenant Id
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
        required: true
      responses:
        "200":
          description: OK
  /test-gc/challenge/{path}:
    get:
      tags:
      - subscriber-listener-test-api
      operationId: testCrc
      parameters:
      - name: path
        in: path
        required: true
        schema:
          type: string
      - name: crc
        in: query
        required: true
        schema:
          type: string
          minLength: 1
      - name: hmac
        in: query
        required: true
        schema:
          type: string
          minLength: 1
      - name: data-partition-id
        in: header
