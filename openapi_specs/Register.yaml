      operationId: testPushHmac
      parameters:
      - name: path
        in: path
        required: true
        schema:
          type: string
      - name: hmac
        in: query
        required: true
        schema:
          type: string
      - name: data-partition-id
        in: header
        description: Tenant Id
        required: true
        schema:
