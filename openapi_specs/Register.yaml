components:
  schemas:
    GsaSecret:
      allOf:
      - $ref: "#/components/schemas/Secret"
      - type: object
        properties:
          value:
            $ref: "#/components/schemas/GsaSecretValue"
      description: Represents a model for 'GSA' Secret type
    GsaSecretValue:
      type: object
      description: Audience/key pair carried inside a GSA secret
      properties:
        audience:
          type: string
          description: Target audience claim used when minting the GSA token
          example: https://myapp.osdu.com
        key:
          type: string
          description: Service account key id used to sign the GSA token
    HmacSecret:
      allOf:
      - $ref: "#/components/schemas/Secret"
      - type: object
        properties:
          value:
            type: string
      description: Represents a model for 'HMAC' Secret type
    Secret:
      description: Represents a model for Secret
      discriminator:
        propertyName: secretType
      properties:
        secretType:
          type: string
      required:
      - secretType
    AppError:
      type: object
      description: Standard error response returned by OSDU services.
      properties:
        code:
          type: integer
          format: int32
          description: HTTP status code.
          example: 400
        reason:
          type: string
          description: Short error reason.
          example: Bad Request
        message:
          type: string
          description: Detailed error message.
          example: Invalid record format.
    Subscription:
      type: object
      description: Represents a model for Subscription
      properties:
        id:
          type: string
          description: Subscription Id
        name:
          type: string
          example: test-subscription
          minLength: 1
          pattern: "^[A-Za-z0-9- ]{2,50}"
        description:
          type: string
          example: test-subscription
          pattern: "^[A-Za-z0-9. ]{0,255}"
        topic:
          type: string
          example: data-changed-v1
          minLength: 1
        pushEndpoint:
          type: string
          example: https://myListener.com
          minLength: 1
        createdBy:
          type: string
          example: test@myapp.com
        notificationId:
          type: string
          example: de-6ee609b9-620e-477b-86f9-3b8907643a12
        secret:
          oneOf:
          - $ref: "#/components/schemas/GsaSecret"
          - $ref: "#/components/schemas/HmacSecret"
      required:
      - name
      - pushEndpoint
      - topic
    Ddms:
      type: object
      description: Represents a model for Ddms
      properties:
        id:
          type: string
          example: example-id-123
          minLength: 1
          pattern: "^[A-Za-z0-9-]{2,50}"
        name:
          type: string
          example: example-name
          minLength: 1
          pattern: "^[A-Za-z0-9- ]{2,50}"
        description:
          type: string
          example: example-description
          pattern: "^[A-Za-z0-9. ]{0,255}"
        contactEmail:
          type: string
          format: email
          example: abc@test.com
        createdDateTimeEpoch:
          type: string
          format: date-time
        interfaces:
          type: array
          items:
            $ref: "#/components/schemas/RegisteredInterface"
          uniqueItems: true
      required:
      - id
      - name
    RegisteredInterface:
      type: object
      description: Represents a model for RegisteredInterface
      properties:
        entityType:
          type: string
          example: wellbore
          minLength: 1
          pattern: "^[\\w\\.-]{2,50}"
        schema:
          type: object
      required:
      - entityType
      - schema
    CreateActionDto:
      type: object
      description: Represents a model to create Action
      properties:
        id:
          type: string
          example: petrel-launch-project
          pattern: "^[A-Za-z0-9-]{2,50}"
        name:
          type: string
          example: Petrel Project
          minLength: 1
          pattern: "^[A-Za-z0-9- ]{2,50}"
        description:
          type: string
          example: This action launches the Petrel projects landing page that holds
            the selected data.
          pattern: "^[A-Za-z0-9. ]{0,255}"
        img:
          type: string
          example: https://mycdn.com/img.png
        url:
          type: string
          example: "https://myapp.osdu.com/action/{type}/{id}"
        contactEmail:
          type: string
          format: email
          example: abc@test.com
        filter:
          $ref: "#/components/schemas/Filter"
      required:
      - name
    Filter:
      type: object
      description: Represents a model for Filter
      properties:
        entityType:
          type: array
          items:
            type: string
        source:
          type: array
          items:
            type: string
        version:
          type: array
          items:
            type: string
    Action:
      type: object
      description: Represents a model for Action
      properties:
        id:
          type: string
          example: petrel-launch-project
        name:
          type: string
          example: Petrel Project
        description:
          type: string
          example: This action launches the Petrel projects landing page that holds
            the selected data.
        img:
          type: string
          example: https://mycdn.com/img.png
        url:
          type: string
          example: "https://myapp.osdu.com/action/{type}/{id}"
        contactEmail:
          type: string
          example: abc@test.com
        createdOnEpoch:
          type: string
          format: date-time
        filter:
          $ref: "#/components/schemas/Filter"
    JsonNode: {}
    TestActionRequest:
      type: object
      description: Represents a model for TestActionRequest
      properties:
        action:
          $ref: "#/components/schemas/CreateActionDto"
        testPayload:
          $ref: "#/components/schemas/JsonNode"
          description: testPayload
          example:
            id: common:regularheightfield:123456
            kind: common:petrel:regularheightfield:1.0.0
            data:
              uri: https://myproj.com/abc123
      required:
      - testPayload
    ParsedAction:
      type: object
      description: Represents a model for ParsedAction
      properties:
        url:
          type: string
          example: https://myapp.osdu.com/action/abc123
        errors:
          type: string
    Topic:
      type: object
      description: Metadata about a notification topic.
      properties:
        name:
          type: string
          description: Unique name of the topic.
        description:
          type: string
          description: Human-readable description of the topic.
        state:
          type: string
          description: Current state of the topic (e.g. ACTIVE).
        example:
          type: string
          additionalProperties: true
          description: An example payload for this topic.
    ChallengeResponse:
      type: object
      description: Response to a subscriber CRC challenge — confirms the subscriber
        holds the shared secret
      properties:
        responseHash:
          type: string
          description: Hash of the supplied crc value computed with the subscriber's
            shared secret
    SubscriptionInfo:
      type: object
      description: Represents a model for SubscriptionInfo
      properties:
        id:
          type: string
          example: dGVzdC1uYW1l
        name:
          type: string
          example: test-subscription
        description:
          type: string
          example: test description
        topic:
          type: string
          example: data-changed-v1
        pushEndpoint:
          type: string
          example: https://myListener.com
        createdBy:
          type: string
          example: test@myapp.com
        notificationId:
          type: string
          example: de-6ee609b9-620e-477b-86f9-3b8907643a12
    ConnectedOuterService:
      type: object
      description: Name and version of an external service that this OSDU service
        connects to.
      properties:
        name:
          type: string
          description: Name of the connected external service.
          example: storage
        version:
          type: string
          description: Version of the connected external service.
          example: 2.0.0
    FeatureFlagState:
      type: object
      description: State of a feature flag for a given partition and source.
      properties:
        name:
          type: string
          description: Name of the feature flag.
          example: collaborations-api
        enabled:
          type: boolean
          description: Whether the feature flag is currently enabled.
          example: true
        partition:
          type: string
          description: Data partition this flag applies to.
          example: opendes
        source:
          type: string
          description: Source configuration that provided this flag state.
          example: runtime
    VersionInfo:
      type: object
      description: Version and build information for an OSDU service.
      properties:
        groupId:
          type: string
          description: Maven group ID of the service artifact.
          example: org.opengroup.osdu
        artifactId:
          type: string
          description: Maven artifact ID of the service.
          example: os-search
        version:
          type: string
          description: Semantic version of the deployed service.
          example: 0.27.0
        buildTime:
          type: string
          description: ISO 8601 timestamp of the build.
          example: 2021-01-26T02:24:13.843Z
        branch:
          type: string
          description: Source control branch from which the service was built.
          example: main
        commitId:
          type: string
          description: Short commit SHA of the build.
          example: "7777777"
        commitMessage:
          type: string
          description: Commit message of the build.
          example: initial commit
        connectedOuterServices:
          type: array
          description: List of external services this service depends on.
          items:
            $ref: "#/components/schemas/ConnectedOuterService"
        featureFlagStates:
          type: array
          description: "Current feature flag states for this partition, if any."
          items:
            $ref: "#/components/schemas/FeatureFlagState"
  securitySchemes:
    Authorization:
      type: http
      name: Authorization
      in: header
      scheme: bearer
      bearerFormat: Authorization
