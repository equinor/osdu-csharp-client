components:
  schemas:
    AliasEntity:
      type: object
      properties:
        userId:
          type: string
        aliasId:
          type: string
    InitServiceDto:
      type: object
      properties:
        aliasMappings:
          type: array
          items:
            $ref: "#/components/schemas/AliasEntity"
    AppError:
      type: object
      description: Standard error response returned by OSDU services.
      properties:
        code:
          type: integer
          format: int32
          description: HTTP status code.
          example: 400
        reason:
          type: string
          description: Short error reason.
          example: Bad Request
        message:
          type: string
          description: Detailed error message.
          example: Invalid record format.
    CreateGroupDto:
      type: object
      description: Represents a model to create a Group
      properties:
        name:
          type: string
          description: Name of the Group
          pattern: "^[A-Za-z0-9_.-]{3,128}$"
        description:
          type: string
          description: Description of the Group
          pattern: "^[-A-Za-z0-9 _./,;:'\"!@&+%#$]{0,255}$"
      required:
      - name
    GroupDto:
      type: object
      description: Represents a model for the Group
      properties:
        name:
          type: string
          description: Name of the Group
        email:
          type: string
          description: Email id of the Group
        description:
          type: string
          description: Description of the Group
    AddMemberDto:
      type: object
      description: Represents a model to add a member
      properties:
        email:
          type: string
          description: Email Id of the member
          minLength: 1
        role:
          type: string
          description: Role of the member
          enum:
          - MEMBER
          - OWNER
      required:
      - email
      - role
    UpdateGroupOperation:
      type: object
      description: Represents a model for the Update Group Operation
      properties:
        path:
          type: string
          description: Update Group Path
        value:
          type: array
          description: list of values to be updated
          items:
            type: string
        op:
          type: string
          description: Update Group Operation
    UpdateGroupResponseDto:
      type: object
      description: Represents a model for the Update Group Response
      properties:
        name:
          type: string
          description: Name of the Updated Group
        email:
          type: string
          description: Email of the Updated Group
        appIds:
          type: array
          description: List of AppId of the Updated Group
          items:
            type: string
    ListGroupResponseDto:
      type: object
      description: Represents a model for List Group Response.
      properties:
        desId:
          type: string
          description: desId
        memberEmail:
          type: string
          description: member email
        groups:
          type: array
          description: Represents a List of Groups
          items:
            $ref: "#/components/schemas/ParentReference"
    ParentReference:
      type: object
      description: Represents a Group reference
      properties:
        name:
          type: string
          description: Name of the group
        description:
          type: string
          description: Description of the group
        role:
          type: string
          description: Role of the caller in the group
        email:
          type: string
          description: Email of the group
    ConnectedOuterService:
      type: object
      description: Name and version of an external service that this OSDU service
        connects to.
      properties:
        name:
          type: string
          description: Name of the connected external service.
          example: storage
        version:
          type: string
          description: Version of the connected external service.
          example: 2.0.0
    FeatureFlagState:
      type: object
      description: State of a feature flag for a given partition and source.
      properties:
        name:
          type: string
          description: Name of the feature flag.
          example: collaborations-api
        enabled:
          type: boolean
          description: Whether the feature flag is currently enabled.
          example: true
        partition:
          type: string
          description: Data partition this flag applies to.
          example: opendes
        source:
          type: string
          description: Source configuration that provided this flag state.
          example: runtime
    VersionInfo:
      type: object
      description: Version and build information for an OSDU service.
      properties:
        groupId:
          type: string
          description: Maven group ID of the service artifact.
          example: org.opengroup.osdu
        artifactId:
          type: string
          description: Maven artifact ID of the service.
          example: os-search
        version:
          type: string
          description: Semantic version of the deployed service.
          example: 0.27.0
        buildTime:
          type: string
          description: ISO 8601 timestamp of the build.
          example: 2021-01-26T02:24:13.843Z
        branch:
          type: string
          description: Source control branch from which the service was built.
          example: main
        commitId:
          type: string
          description: Short commit SHA of the build.
          example: "7777777"
        commitMessage:
          type: string
          description: Commit message of the build.
          example: initial commit
        connectedOuterServices:
          type: array
          description: List of external services this service depends on.
          items:
            $ref: "#/components/schemas/ConnectedOuterService"
        featureFlagStates:
          type: array
          description: "Current feature flag states for this partition, if any."
          items:
            $ref: "#/components/schemas/FeatureFlagState"
    ListMemberResponseDto:
      type: object
      description: Represents a model for List Member Response
      properties:
        members:
          type: array
          description: List of Members
          items:
            $ref: "#/components/schemas/MemberDto"
    MemberDto:
      type: object
      description: Represents a model for the Member
      properties:
        email:
          type: string
          description: Email Id of the member
        role:
          type: string
          description: Role of the member
          enum:
          - MEMBER
          - OWNER
        memberType:
          type: string
          description: Type of the member
          enum:
          - USER
          - GROUP
        dataPartitionId:
          type: string
          description: dataPartitionId
    ListGroupsOfPartitionDto:
      type: object
      description: Represents a List Group of Partition model.
      properties:
        groups:
          type: array
          description: Represents a List of Groups
          items:
            $ref: "#/components/schemas/ParentReference"
        cursor:
          type: string
          description: cursor
        totalCount:
          type: integer
          format: int64
          description: Total Count
  securitySchemes:
    Authorization:
      type: http
      name: Authorization
      in: header
      scheme: bearer
      bearerFormat: Authorization
