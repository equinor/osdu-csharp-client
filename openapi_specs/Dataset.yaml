components:
  schemas:
    Acl:
      type: object
      description: Access control lists defining which groups can view or own a record.
      properties:
        viewers:
          type: array
          description: List of valid groups which will have view/read privileges over
            the record.
          items:
            type: string
            example: data.default.viewers@opendes.contoso.com
            pattern: "^data\\.[a-zA-Z0-9_+&*-]+(?:\\.[a-zA-Z0-9_+&*-]+)*@(?:[a-zA-Z](?:[a-zA-Z0-9-]{0,61}[a-zA-Z0-9])?\\\
              .)+[a-zA-Z](?:[a-zA-Z0-9-]{0,61}[a-zA-Z0-9])?$"
        owners:
          type: array
          description: List of valid groups which will have write privileges over
            the record.
          items:
            type: string
            example: data.default.owners@opendes.contoso.com
            pattern: "^data\\.[a-zA-Z0-9_+&*-]+(?:\\.[a-zA-Z0-9_+&*-]+)*@(?:[a-zA-Z](?:[a-zA-Z0-9-]{0,61}[a-zA-Z0-9])?\\\
              .)+[a-zA-Z](?:[a-zA-Z0-9-]{0,61}[a-zA-Z0-9])?$"
      required:
      - owners
      - viewers
    CreateDatasetRegistryRequest:
      type: object
      description: Dataset registry ids
      properties:
        datasetRegistries:
          type: array
          items:
            $ref: "#/components/schemas/Record"
          maxItems: 20
          minItems: 1
      required:
      - datasetRegistries
    Legal:
      type: object
      properties:
        legaltags:
          type: array
          description: List of legal tag names associated with this record.
          items:
            type: string
            example: opendes-Default-Legal-Tag
          minItems: 1
          uniqueItems: true
        otherRelevantDataCountries:
          type: array
          description: ISO 3166-1 alpha-2 country codes of other relevant data countries.
          items:
            type: string
            example: US
          minItems: 1
          uniqueItems: true
        status:
          type: string
          description: "Compliance status of the legal tags, assigned by the server."
          enum:
          - compliant
          - incompliant
          example: compliant
          readOnly: true
      required:
      - legaltags
      - otherRelevantDataCountries
    Record:
      type: object
      description: "An OSDU record containing a data payload, access control, legal\
        \ tags, and system-managed metadata."
      properties:
        id:
          type: string
          description: "Unique identifier in whole Data Ecosystem. When not provided,\
            \ Data Ecosystem will create and assign an id to the record. Must follow\
            \ the naming convention: {Data-Partition-Id}:{object-type}:{uuid}."
          example: common:work-product-component--wellLog:123456
          pattern: "^[\\w\\-\\.]+:[\\w\\-\\.]+:[\\w\\-\\.\\:\\%]+$"
        version:
          type: integer
          format: int64
          description: "Record version number, assigned by the server on each update."
          readOnly: true
        kind:
          type: string
          description: Record kind for which the schema information is applied to.
          example: common:wks:work-product-component--wellLog:1.0.0
          pattern: "^[\\w\\-\\.]+:[\\w\\-\\.]+:[\\w\\-\\.]+:[0-9]+.[0-9]+.[0-9]+$"
        acl:
          $ref: "#/components/schemas/Acl"
          description: Access control lists for viewers and owners.
        legal:
          $ref: "#/components/schemas/Legal"
          description: Legal tags and other relevant data countries.
        data:
          type: object
          additionalProperties: true
          description: The record payload as a free-form JSON object.
          minProperties: 1
        ancestry:
          $ref: "#/components/schemas/RecordAncestry"
          description: Ancestry information listing parent record IDs.
        meta:
          type: array
          description: Optional array of meta sub-objects.
          items:
            type: object
            additionalProperties: true
        tags:
          type: object
          additionalProperties:
            type: string
          description: User-defined tags as key-value pairs.
        createUser:
          type: string
          description: User who created this record.
          readOnly: true
        createTime:
          type: string
          format: date-time
          description: ISO 8601 timestamp of record creation.
          readOnly: true
        modifyUser:
          type: string
          description: User who last modified this record.
          readOnly: true
        modifyTime:
          type: string
          format: date-time
          description: ISO 8601 timestamp of the last modification.
          readOnly: true
      required:
      - acl
      - data
      - id
      - kind
      - legal
    RecordAncestry:
      type: object
      description: "Ancestry information for a record, listing the parent record references\
        \ from which this record was derived."
      properties:
        parents:
          type: array
          description: "List of parent records. Must follow the naming convention:\
            \ {parent-record-id}:{parent-record-version}."
          items:
            type: string
            example: opendes:osdu--wellbore:123456789:1
          uniqueItems: true
    GetCreateUpdateDatasetRegistryResponse:
      type: object
      properties:
        datasetRegistries:
          type: array
          items:
            $ref: "#/components/schemas/Record"
    AppError:
      type: object
      description: Standard error response returned by OSDU services.
      properties:
        code:
          type: integer
          format: int32
          description: HTTP status code.
          example: 400
        reason:
          type: string
          description: Short error reason.
          example: Bad Request
        message:
          type: string
          description: Detailed error message.
          example: Invalid record format.
    GetDatasetStorageInstructionsResponse:
      type: object
      properties:
        storageLocation:
          type: object
          additionalProperties:
            type: object
        providerKey:
          type: string
    GetDatasetRegistryRequest:
      type: object
      description: Dataset registry ids
      properties:
        datasetRegistryIds:
          type: array
          items:
            type: string
          maxItems: 20
          minItems: 1
      required:
      - datasetRegistryIds
    DatasetRetrievalProperties:
      type: object
      properties:
        datasetRegistryId:
          type: string
        retrievalProperties:
          type: object
          additionalProperties:
            type: object
        providerKey:
          type: string
    RetrievalInstructionsResponse:
      type: object
      properties:
        datasets:
          type: array
          items:
            $ref: "#/components/schemas/DatasetRetrievalProperties"
    ConnectedOuterService:
      type: object
      description: Name and version of an external service that this OSDU service
        connects to.
      properties:
        name:
          type: string
          description: Name of the connected external service.
          example: storage
        version:
          type: string
          description: Version of the connected external service.
          example: 2.0.0
    FeatureFlagState:
      type: object
      description: State of a feature flag for a given partition and source.
      properties:
        name:
          type: string
          description: Name of the feature flag.
          example: collaborations-api
        enabled:
          type: boolean
          description: Whether the feature flag is currently enabled.
          example: true
        partition:
          type: string
          description: Data partition this flag applies to.
          example: opendes
        source:
          type: string
          description: Source configuration that provided this flag state.
          example: runtime
    VersionInfo:
      type: object
      description: Version and build information for an OSDU service.
      properties:
        groupId:
          type: string
          description: Maven group ID of the service artifact.
          example: org.opengroup.osdu
        artifactId:
          type: string
          description: Maven artifact ID of the service.
          example: os-search
        version:
          type: string
          description: Semantic version of the deployed service.
          example: 0.27.0
        buildTime:
          type: string
          description: ISO 8601 timestamp of the build.
          example: 2021-01-26T02:24:13.843Z
        branch:
          type: string
          description: Source control branch from which the service was built.
          example: main
        commitId:
          type: string
          description: Short commit SHA of the build.
          example: "7777777"
        commitMessage:
          type: string
          description: Commit message of the build.
          example: initial commit
        connectedOuterServices:
          type: array
          description: List of external services this service depends on.
          items:
            $ref: "#/components/schemas/ConnectedOuterService"
        featureFlagStates:
          type: array
          description: "Current feature flag states for this partition, if any."
          items:
            $ref: "#/components/schemas/FeatureFlagState"
  securitySchemes:
    Authorization:
      type: http
      name: Authorization
      in: header
      scheme: bearer
      bearerFormat: Authorization
