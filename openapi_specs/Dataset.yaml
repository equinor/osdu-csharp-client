      operationId: retrievalInstructions
      parameters:
      - name: id
        in: query
        description: Dataset registry id
        required: true
        schema:
          type: string
        example: opendes:dataset--File.Generic:8118591ee2
      - name: expiryTime
        in: query
        description: "The Time for which Signed URL to be valid. Accepted Regex patterns\
          \ are \"^[0-9]+M$\", \"^[0-9]+H$\", \"^[0-9]+D$\" denoting Integer values\
          \ in Minutes, Hours, Days respectively. In absence of this parameter the\
          \ URL would be valid for 1 Hour."
        required: false
        schema:
          type: string
          pattern: "\\d+([mhd]|[MHD])$"
        example: 5M
      - name: data-partition-id
        in: header
        description: Tenant Id
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetrievalInstructionsResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "401":
          description: Unauthorized
          content:
