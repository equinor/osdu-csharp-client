openapi: 3.1.0
info:
  title: Dataset Service
  description: Dataset service provides internal and external API endpoints to allow
    application or user fetch storage/retrieval instructions for various types of
    datasets.
  contact:
    name: OSDU Data Platform Team
    email: dps@OSDU.org
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
  version: 1.0.0
servers:
- url: /api/dataset/v1/
security:
- Authorization: []
tags:
- name: dataset
  description: Dataset DMS and Dataset Registry related operations
- name: health-check-api
  description: Health Check API
- name: dataset
  description: dataset api operations
- name: info
  description: Version info endpoint
paths:
  /registerDataset:
    put:
      tags:
      - dataset
      summary: Create or Update Dataset Registry
      description: "Create or Update Dataset Registry. \n**Required roles: `service.storage.creator`\
        \ or `service.storage.admin`."
      operationId: createOrUpdateDatasetRegistry
      parameters:
      - name: data-partition-id
        in: header
        description: Tenant Id
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDatasetRegistryRequest"
        required: true
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetCreateUpdateDatasetRegistryResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "403":
          description: User not authorized to perform the action.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "502":
          description: Bad Gateway
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "503":
          description: Service Unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
      security:
      - Authorization: []
  /storageInstructions:
    post:
      tags:
      - dataset
      summary: 'Generate storage instructions '
      description: "Generate storage instructions (Eg - Signed URLs) for datasets.\
        \ \nRequired roles: `service.dataset.editors`."
      operationId: storageInstructions
      parameters:
      - name: kindSubType
        in: query
        description: subType of the kind (partition:wks:kindSubType:version)
        required: true
        schema:
          type: string
        example: dataset--File.Generic
      - name: expiryTime
        in: query
        description: "The Time for which Signed URL to be valid. Accepted Regex patterns\
          \ are \"^[0-9]+M$\", \"^[0-9]+H$\", \"^[0-9]+D$\" denoting Integer values\
          \ in Minutes, Hours, Days respectively. In absence of this parameter the\
          \ URL would be valid for 1 Hour."
        required: false
        schema:
          type: string
          pattern: "\\d+([mhd]|[MHD])$"
        example: 5M
      - name: data-partition-id
        in: header
        description: Tenant Id
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetDatasetStorageInstructionsResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "403":
          description: User not authorized to perform the action.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "502":
          description: Bad Gateway
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "503":
          description: Service Unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
      security:
      - Authorization: []
  /revokeURL:
    post:
      tags:
      - dataset
      summary: Revoke previously generated URLs for Dataset
      description: "Revoke previously generated URLs associated with a specific dataset\
        \ kind subtype(Eg - dataset--File.Generic). \nRequired roles: `service.dataset.admin`."
      operationId: revokeURL
      parameters:
      - name: kindSubType
        in: query
        description: subType of the kind (partition:wks:kindSubType:version)
        required: true
        schema:
          type: string
        example: dataset--File.Generic
      - name: data-partition-id
        in: header
        description: Tenant Id
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties:
                type: string
              description: Map of URL identifiers to revoke
        required: true
      responses:
        "204":
          description: Revoked URLs successfully.
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
