name: Build

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.x"

      - name: Install Kiota
        run: dotnet tool install --global Microsoft.OpenApi.Kiota

      - name: Generate C# clients
        run: python generate_all.py

      - name: Build
        run: dotnet build src/OsduCsharpClient/OsduCsharpClient.csproj --configuration Release

      - name: Pack
        if: github.event_name == 'push'
        run: dotnet pack src/OsduCsharpClient/OsduCsharpClient.csproj --configuration Release --no-build --output nupkgs

      - name: Publish to GitHub Packages
        if: github.event_name == 'push'
        run: |
          dotnet nuget add source \
            --username ${{ github.actor }} \
            --password ${{ secrets.GITHUB_TOKEN }} \
            --store-password-in-clear-text \
            --name github \
            "https://nuget.pkg.github.com/equinor/index.json"
          dotnet nuget push nupkgs/*.nupkg --source github --skip-duplicate
